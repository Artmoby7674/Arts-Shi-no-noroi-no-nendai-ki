modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mixins]]
    config="shinoroi.mixins.json"

[[mods]]
    modId="${mod_id}"
    version="${mod_version}"
    displayName="${mod_name}"
    description='''${mod_description}'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="${neo_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Free Camera API — optional; FightCameraPlugin auto-registers via @CameraPlugin if present.
# Must load BEFORE shinoroi so the API's class scanner is ready when our plugin is registered.
[[dependencies.${mod_id}]]
    modId="free_camera_api"
    type="optional"
    versionRange="[3.2.0,)"
    ordering="BEFORE"
    side="CLIENT"

# Curios API — optional; CuriosCompat bridges inventory save/restore for Curios slots.
[[dependencies.${mod_id}]]
    modId="curios"
    type="optional"
    versionRange="[9.5.0,)"
    ordering="BEFORE"
    side="BOTH"
